name: Build Docker image for Orchestrating Microbiome Analysis manuscript
env:
  DOCKER_ORGANIZATION: artur-sannikov
  DOCKER_REPO: oma-manuscript
  DOCKER_IMAGE_NAME: oma-manuscript
on:
  workflow_dispatch:
  push:
    branches:
      # Switch only to needed branches after testing
      - "feat/docker-image"
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ghcr.io/${{ env.DOCKER_ORGANIZATION }}/${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.DOCKER_ORGANIZATION }}/${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-to: type=inline
